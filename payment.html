<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="
  margin:0;
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
">

<script>
  function startPayment(data) {
    var options = {
      key: data.key,
      amount: data.amount,
      currency: "INR",
      name: "DropPoint",
      description: "Locker Storage",
      order_id: data.orderId,

      handler: function (response) {
        PaymentSuccess.postMessage(JSON.stringify(response));
      },

      modal: {
        ondismiss: function () {
          PaymentFailed.postMessage("cancelled");
        }
      },

      theme: { color: "#FF7A00" }
    };

    var rzp = new Razorpay(options);
    rzp.open();
  }
</script>

</body>
</html>
